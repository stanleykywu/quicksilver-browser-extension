<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        :root {
            color-scheme: light;
            font-family: "Avenir Next", "Segoe UI", sans-serif;
        }

        body {
            width: 320px;
            margin: 0;
            padding: 16px;
            background: linear-gradient(180deg, #f7f4ea 0%, #ffffff 100%);
            color: #1f2933;
        }

        .card {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .eyebrow {
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #7b8794;
            margin-top: 20px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            border: 0;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        button:disabled {
            cursor: default;
            opacity: 0.6;
        }

        #record {
            background: #126782;
            color: #fff;
        }

        #cancel {
            background: #d9e2ec;
            color: #243b53;
        }

        .results-section {
            display: grid;
            gap: 8px;
        }

        .history-accordion {
            display: grid;
            gap: 8px;
            margin-top: 4px;
        }

        .history-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            border: 0;
            padding: 0;
            background: transparent;
            color: #7b8794;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-align: left;
            cursor: pointer;
        }

        .history-toggle:hover {
            color: #52606d;
        }

        .history-toggle-label {
            letter-spacing: inherit;
        }

        .history-toggle-icon {
            font-size: 13px;
            line-height: 1;
            transition: transform 0.22s ease;
        }

        .history-toggle[aria-expanded="true"] .history-toggle-icon {
            transform: rotate(180deg);
        }

        .history-panel {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.26s ease, opacity 0.18s ease;
        }

        .history-panel.expanded {
            max-height: 520px;
            opacity: 1;
        }

        .history-panel-inner {
            overflow: hidden;
            padding: 0 0 12px;
            transform: translateY(-6px);
            transition: transform 0.24s ease;
        }

        .history-panel.expanded .history-panel-inner {
            transform: translateY(0);
        }

        .results-list {
            display: grid;
            gap: 10px;
        }

        .results-empty {
            padding: 12px;
            border-radius: 12px;
            background: #f0f4f8;
            font-size: 13px;
            color: #52606d;
        }

        .result-item {
            display: grid;
            gap: 6px;
            padding: 12px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 12px;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
        }

        .result-item.pending {
            background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
            border-color: rgba(148, 163, 184, 0.28);
        }

        .result-item.non-ai {
            background: linear-gradient(180deg, #edf8f1 0%, #e3f1e8 100%);
            border-color: rgba(54, 125, 69, 0.22);
        }

        .result-item.ai {
            background: linear-gradient(180deg, #fff1f1 0%, #fde3e3 100%);
            border-color: rgba(181, 72, 72, 0.22);
        }

        .result-item-verdict {
            font-size: 24px;
            font-weight: 800;
            line-height: 1.2;
            word-break: break-word;
        }

        .result-item-title {
            font-size: 13px;
            font-weight: 700;
            line-height: 1.3;
            word-break: break-word;
        }

        .result-item-title a {
            color: inherit;
            text-decoration: underline;
        }

        .result-item-title a:hover {
            color: #126782;
        }

        .result-item-meta {
            font-size: 12px;
            color: #52606d;
            white-space: pre-line;
        }

        .result-item-probability {
            font-size: 13px;
            font-weight: 600;
            color: #52606d;
        }

        .result-item-warning {
            padding: 8px 10px;
            border-radius: 10px;
            background: #fef3c7;
            color: #92400e;
            font-size: 12px;
            font-weight: 600;
            line-height: 1.4;
        }

        .instructions {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 16px;
            text-align: center;
            text-align-last: center;
            line-height: 1.45;
        }

        #timer-container {
            justify-content: center;
            align-items: center;
            margin: 8px 0 16px;
            text-align: center;
            flex-direction: column;
        }

        #timer-container.hidden {
            display: none;
        }

        #timer-container:not(.hidden) {
            display: flex;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            margin: 0 0 10px;
            border-radius: 999px;
            background: #d9e2ec;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            border-radius: 999px;
            background: #126782;
            transition: width 0.2s linear;
        }

        #timer {
            font-variant-numeric: tabular-nums;
            font-size: 32px;
            font-weight: 700;
            color: #1f2933;
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: auto;
            padding-top: 4px;
        }

        .placeholder-link {
            font-size: 10px;
            color: #7b8794;
            text-decoration: none;
        }

        .placeholder-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="instructions">
            Please play music as you would normally in the browser. As the music is playing, press "Analyze" and allow
            music to play for 30 seconds to avoid incomplete results.
        </div>

        <div id="timer-container" class="hidden">
            <div class="progress-bar" aria-hidden="true">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div id="timer">00:30</div>
        </div>

        <div class="actions">
            <button id="record">Analyze</button>
            <button id="cancel" disabled>Cancel</button>
        </div>

        <div class="results-section">
            <div class="eyebrow">Current Page</div>
            <div id="results-list" class="results-list">
                <div id="results-empty" class="results-empty">No results yet</div>
            </div>
            <div class="history-accordion">
                <button id="history-toggle" class="history-toggle" type="button" aria-expanded="false" aria-controls="history-panel">
                    <span class="history-toggle-label">Recent detections</span>
                    <span class="history-toggle-icon" aria-hidden="true">▾</span>
                </button>
                <div id="history-panel" class="history-panel" aria-hidden="true">
                    <div class="history-panel-inner">
                        <div id="history-list" class="results-list"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-footer">
            <a class="placeholder-link" href="#" target="_blank" rel="noopener noreferrer">placeholder link</a>
        </div>
    </div>
    <script type="module" src="popup.js"></script>
</body>

</html>
